# LuxenOS desktop hardening and responsive laptop defaults.
# These values are conservative and suitable for a general-purpose live system.
kernel.kptr_restrict = 2
kernel.dmesg_restrict = 1
kernel.unprivileged_bpf_disabled = 1
kernel.yama.ptrace_scope = 1
net.ipv4.tcp_syncookies = 1
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1
# Low swappiness keeps the system responsive on laptops without a configured
# zram/zswap backend: the kernel prefers reclaiming page cache over swapping
# out application memory to (often slow, USB-backed) disk. Raise this only if
# a fast swap device (zram, NVMe) is added.
vm.swappiness = 10
vm.vfs_cache_pressure = 50
